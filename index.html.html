<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大奉燈 チェックリスト｜百万石まつり</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --scarlet: #C0392B;
    --gold: #C9922A;
    --gold-light: #F0C040;
    --ink: #1A1008;
    --paper: #FDF6E3;
    --paper-dark: #F0E6CC;
    --paper-darker: #E0D0A8;
    --done-bg: #E8F5E9;
    --done-text: #4CAF50;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* Header */
  header {
    background: var(--scarlet);
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 6px, rgba(255,255,255,0.05) 6px, rgba(255,255,255,0.05) 7px),
      repeating-linear-gradient(90deg, transparent, transparent 6px, rgba(255,255,255,0.05) 6px, rgba(255,255,255,0.05) 7px);
    padding: 20px 16px 16px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 3px 12px rgba(0,0,0,0.35);
  }

  .header-kamon {
    font-size: 28px;
    line-height: 1;
    margin-bottom: 4px;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5));
  }

  header h1 {
    font-family: 'Noto Serif JP', serif;
    font-weight: 900;
    font-size: 22px;
    color: var(--gold-light);
    letter-spacing: 0.12em;
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
  }

  header p {
    color: rgba(255,240,200,0.85);
    font-size: 11px;
    margin-top: 3px;
    letter-spacing: 0.05em;
  }

  /* Progress bar */
  .progress-wrap {
    background: var(--paper-dark);
    border-bottom: 2px solid var(--paper-darker);
    padding: 10px 16px;
    position: sticky;
    top: 89px;
    z-index: 99;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #7a6040;
    margin-bottom: 5px;
    font-weight: 500;
  }

  .progress-bar-bg {
    background: var(--paper-darker);
    border-radius: 4px;
    height: 8px;
    overflow: hidden;
  }

  .progress-bar-fill {
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* Reset button */
  .reset-btn {
    display: block;
    margin: 10px 16px 0;
    background: none;
    border: 1px solid var(--paper-darker);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
    color: #7a6040;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .reset-btn:active { background: var(--paper-darker); }

  /* Section */
  .section {
    margin: 14px 12px 0;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    padding: 0 4px;
  }

  .section-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .section-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.1em;
  }

  .section-count {
    margin-left: auto;
    font-size: 11px;
    color: #7a6040;
    background: var(--paper-dark);
    padding: 2px 8px;
    border-radius: 10px;
  }

  /* Categories */
  .sec-当日 .section-icon { background: var(--scarlet); }
  .sec-確認 .section-icon { background: #2C6E8A; }
  .sec-準備 .section-icon { background: #5C8A2C; }
  .sec-購入 .section-icon { background: #8A5C2C; }

  .sec-当日 .section-title { color: var(--scarlet); }
  .sec-確認 .section-title { color: #2C6E8A; }
  .sec-準備 .section-title { color: #5C8A2C; }
  .sec-購入 .section-title { color: #8A5C2C; }

  /* Card */
  .card {
    background: #fff;
    border-radius: 10px;
    border: 1.5px solid var(--paper-darker);
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }

  /* Item */
  .item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 14px;
    border-bottom: 1px solid var(--paper-dark);
    cursor: pointer;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .item:last-child { border-bottom: none; }
  .item:active { background: var(--paper); }

  .item.checked {
    background: #F7FBF7;
  }

  .check-box {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    border: 2px solid var(--paper-darker);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    font-size: 14px;
  }

  .item.checked .check-box {
    background: var(--done-text);
    border-color: var(--done-text);
    color: white;
  }

  /* 当日 */
  .sec-当日 .item.checked .check-box { background: var(--scarlet); border-color: var(--scarlet); }
  .sec-確認 .item.checked .check-box { background: #2C6E8A; border-color: #2C6E8A; }
  .sec-準備 .item.checked .check-box { background: #5C8A2C; border-color: #5C8A2C; }
  .sec-購入 .item.checked .check-box { background: #8A5C2C; border-color: #8A5C2C; }

  .item-text {
    flex: 1;
    font-size: 14px;
    line-height: 1.45;
    transition: opacity 0.2s, text-decoration 0.2s;
  }

  .item.checked .item-text {
    opacity: 0.45;
    text-decoration: line-through;
  }

  .item-qty {
    font-size: 11px;
    color: var(--gold);
    background: #FEF8E8;
    border: 1px solid #EDD580;
    border-radius: 8px;
    padding: 2px 7px;
    white-space: nowrap;
    font-weight: 700;
  }

  /* Note */
  .item-note {
    font-size: 11px;
    color: #999;
    margin-top: 2px;
  }

  /* Complete banner */
  #complete-banner {
    display: none;
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, var(--scarlet), #8B1A1A);
    color: var(--gold-light);
    font-family: 'Noto Serif JP', serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 14px 28px;
    border-radius: 40px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.35);
    z-index: 200;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <div class="header-kamon">🏮</div>
  <h1>大奉燈 チェックリスト</h1>
  <p>百万石まつり ／ 地頭町</p>
</header>

<div class="progress-wrap">
  <div class="progress-label">
    <span>進捗</span>
    <span id="progress-text">0 / 0 完了</span>
  </div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progress-fill"></div>
  </div>
  <button class="reset-btn" onclick="resetAll()">↺ すべてリセット</button>
</div>

<div id="checklist"></div>

<div id="complete-banner">🎉 全項目チェック完了！</div>

<script>
const data = [
  {
    id: "当日",
    icon: "🏮",
    label: "当日 持ち物",
    items: [
      { text: "屋根（足）ツノ", qty: "2" },
      { text: "かたね棒", qty: "6" },
      { text: "腰巻（棒）" },
      { text: "鯉", qty: "2" },
      { text: "房" },
      { text: "榊・紙垂", qty: "2" },
      { text: "ぼんぼり", qty: "6" },
      { text: "バッテリー大・箱" },
      { text: "アンプ類" },
      { text: "ゴムマット" },
      { text: "立てる時の足" },
      { text: "立った後の足", qty: "4" },
      { text: "台車", qty: "2" },
      { text: "座布団", qty: "6枚以上" },
      { text: "ジャンジャン（棒）・かけや・当て木" },
      { text: "縄", qty: "2" },
      { text: "上のぼんぼりつける治具" },
      { text: "工具（ラ19・ス13・モ）" },
      { text: "結束バンド" },
      { text: "さっさ" },
      { text: "椿油" },
      { text: "雨天用の袋" },
      { text: "電池 単3・単4" },
      { text: "空気入れ" },
    ]
  },
  {
    id: "確認",
    icon: "🔍",
    label: "事前確認",
    items: [
      { text: "かたね棒のボルト・ナット確認" },
    ]
  },
  {
    id: "準備",
    icon: "📋",
    label: "事前準備",
    items: [
      { text: "腰巻 しわ取り・霧吹き" },
      { text: "ぼんぼり・横障子の張替", note: "横障子の取り外し未" },
      { text: "ジャンジャン作成", note: "一斗缶2つ予備2個・棒は使用可" },
      { text: "法被 枚数・番号確認" },
      { text: "地区への参加要請", note: "対象：領家・高田・七海（副会長→地区会長 or 青年会→地区会長）" },
      { text: "台車の空気確認", note: "川田さんにお願い／当日空気入れ借りる" },
    ]
  },
  {
    id: "購入",
    icon: "🛒",
    label: "購入必要品",
    items: [
      { text: "ヒンジ（腰巻）スプレー", note: "かわらや" },
      { text: "笛", qty: "5" },
      { text: "電池" },
      { text: "さっさ" },
      { text: "結束バンド" },
      { text: "ぼんぼり・横障子の紙", note: "中林 → 依頼済み" },
      { text: "一斗缶", qty: "4つ", note: "りょーくん" },
    ]
  }
];

const STORAGE_KEY = 'hyakumangoku_checklist_v1';

function loadState() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch { return {}; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();

function render() {
  const container = document.getElementById('checklist');
  container.innerHTML = '';

  data.forEach(section => {
    const sec = document.createElement('div');
    sec.className = `section sec-${section.id}`;

    const header = document.createElement('div');
    header.className = 'section-header';

    const doneCount = section.items.filter((_, i) => state[`${section.id}-${i}`]).length;

    header.innerHTML = `
      <div class="section-icon">${section.icon}</div>
      <div class="section-title">${section.label}</div>
      <div class="section-count">${doneCount}/${section.items.length}</div>
    `;

    const card = document.createElement('div');
    card.className = 'card';

    section.items.forEach((item, i) => {
      const key = `${section.id}-${i}`;
      const checked = !!state[key];

      const el = document.createElement('div');
      el.className = 'item' + (checked ? ' checked' : '');
      el.innerHTML = `
        <div class="check-box">${checked ? '✓' : ''}</div>
        <div class="item-text">
          ${item.text}
          ${item.note ? `<div class="item-note">※ ${item.note}</div>` : ''}
        </div>
        ${item.qty ? `<div class="item-qty">${item.qty}</div>` : ''}
      `;
      el.addEventListener('click', () => {
        state[key] = !state[key];
        saveState(state);
        render();
        updateProgress();
      });

      card.appendChild(el);
    });

    sec.appendChild(header);
    sec.appendChild(card);
    container.appendChild(sec);
  });

  updateProgress();
}

function updateProgress() {
  const total = data.reduce((s, sec) => s + sec.items.length, 0);
  const done = data.reduce((s, sec) =>
    s + sec.items.filter((_, i) => state[`${sec.id}-${i}`]).length, 0);

  document.getElementById('progress-text').textContent = `${done} / ${total} 完了`;
  document.getElementById('progress-fill').style.width = `${total ? (done / total * 100) : 0}%`;

  const banner = document.getElementById('complete-banner');
  if (done === total && total > 0) {
    banner.style.display = 'block';
  } else {
    banner.style.display = 'none';
  }
}

function resetAll() {
  if (confirm('チェックをすべてリセットしますか？')) {
    state = {};
    saveState(state);
    render();
  }
}

render();
</script>
</body>
</html>
